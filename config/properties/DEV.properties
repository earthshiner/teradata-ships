# ===================================================================
# DEV.properties — GCFR_SHIPS deployment, DEV environment
#
# Promotion: copy this file to TST.properties / PRD.properties and
# change ONLY the "Composition roots" section (section 1).
# Everything below derives automatically through {{TOKEN}} cascade.
#
# Usage:
#   python -m td_release_packager package \
#       --source . --env DEV --name GCFR_SHIPS \
#       --properties config/properties/DEV.properties
#
# Naming grammar:
#
#   {{ENV_PREFIX}}_{{SHIPS_ENV}}_{{INSTANCE}}_{{LAYER}}_{{SECURITY_TIER}}_{{KIND}}
#         PDE          DEV           00           MDL           0             T
#
#   Environment composite ─┘                                     │
#   Classified leaf ──────────────────────────────────────────────┘
#
#   ENV_PREFIX     Physical Teradata prefix (per topology)
#   SHIPS_ENV      Logical environment (DEV/TST/PRD; matches --env)
#   INSTANCE       Parallel deployment instance (00 = primary)
#   LAYER          Architectural layer (MDL/STG/SEM/OPR/...)
#   SECURITY_TIER  Data classification (0 = generally accessible)
#   KIND           Object kind (T=table, V=view, M=macro, P=procedure)
# ===================================================================


# -------------------------------------------------------------------
# 1. Composition roots  (the only env-specific section)
# -------------------------------------------------------------------
# Cross-checked against --env at package time. Mismatch = build fail.
SHIPS_ENV=DEV

# Physical Teradata prefix. PDE per current topology.
ENV_PREFIX=PDE

# Project identifier. Same in every env file for this project.
SHIPS_PROJECT=GCFR_SHIPS

# Deployment instance — two-digit. Allows parallel deployments
# of the same project/env on the same physical prefix
# (e.g. 00 = primary, 01 = hotfix stream, 02 = perf test).
INSTANCE=00

# Security classification tier.
#   0 = generally accessible (the default for this project).
#   1+ reserved for restricted data domains (PII, financial, etc.).
# If you ever need mixed tiers across layers, replace this with
# per-layer tokens (BASE_SEC, OPR_SEC, ...) — backward compatible.
SECURITY_TIER=0


# -------------------------------------------------------------------
# 2. Derived database names
# (Do NOT edit per-env. These compose from section 1.)
# -------------------------------------------------------------------
PARENT_NODE={{ENV_PREFIX}}_{{SHIPS_ENV}}_{{INSTANCE}}
BASE_NODE={{ENV_PREFIX}}_{{SHIPS_ENV}}_MDL

# --- BASE / Model layer ---
BASE_T={{PARENT_NODE}}_MDL_{{SECURITY_TIER}}_T
BASE_V={{PARENT_NODE}}_MDL_{{SECURITY_TIER}}_V

# --- GCFR framework layer ---
GCFR_NODE={{PARENT_NODE}}_GCFR
GCFR_T={{PARENT_NODE}}_GCFR_STD_{{SECURITY_TIER}}_T
GCFR_V={{PARENT_NODE}}_GCFR_STD_{{SECURITY_TIER}}_V
GCFR_M={{PARENT_NODE}}_GCFR_STD_{{SECURITY_TIER}}_M
GCFR_P_API={{PARENT_NODE}}_GCFR_API
GCFR_P_BB={{PARENT_NODE}}_GCFR_BBP_{{SECURITY_TIER}}_P
GCFR_P_FF={{PARENT_NODE}}_GCFR_FFP_{{SECURITY_TIER}}_P
GCFR_P_UT={{PARENT_NODE}}_GCFR_UTP_{{SECURITY_TIER}}_P
GCFR_P_CP={{PARENT_NODE}}_GCFR_CPP_{{SECURITY_TIER}}_P
GCFR_P_PP={{PARENT_NODE}}_GCFR_PPP_{{SECURITY_TIER}}_P

# --- Working / staging layers ---
TMP_NODE={{PARENT_NODE}}_TMP
TMP_T={{PARENT_NODE}}_TMP_{{SECURITY_TIER}}_T
WRK_T={{PARENT_NODE}}_WRK_{{SECURITY_TIER}}_T
STG_NODE={{PARENT_NODE}}_STG
STG_T={{PARENT_NODE}}_STG_{{SECURITY_TIER}}_T
STG_V={{PARENT_NODE}}_STG_{{SECURITY_TIER}}_V

# --- Source / Outbound interface ---
OI_NODE={{PARENT_NODE}}_SRC
OI_T={{PARENT_NODE}}_SRC_{{SECURITY_TIER}}_T
OI_V={{PARENT_NODE}}_SRC_{{SECURITY_TIER}}_V

# --- Utility layer ---
UTL_NODE={{PARENT_NODE}}_UTL
UTL_T={{PARENT_NODE}}_UTL_{{SECURITY_TIER}}_T
UTL_V={{PARENT_NODE}}_UTL_{{SECURITY_TIER}}_V

# --- Transform layer ---
TXFM_NODE={{PARENT_NODE}}_TFM
TXFM_INP_V={{PARENT_NODE}}_INP_{{SECURITY_TIER}}_V
TXFM_OUT_V={{PARENT_NODE}}_OUT_{{SECURITY_TIER}}_V

# --- Semantic layer ---
SEM_NODE={{PARENT_NODE}}_SEM
SEM_T={{PARENT_NODE}}_SEM_{{SECURITY_TIER}}_T
SEM_V={{PARENT_NODE}}_SEM_{{SECURITY_TIER}}_V

# --- Operational layer ---
OPR_NODE={{PARENT_NODE}}_OPR
OPR_T={{PARENT_NODE}}_GCFR_OPR_{{SECURITY_TIER}}_T
OPR_V={{PARENT_NODE}}_GCFR_OPR_{{SECURITY_TIER}}_V
OPR_M={{PARENT_NODE}}_GCFR_OPR_{{SECURITY_TIER}}_M


# -------------------------------------------------------------------
# 3. Users & roles
# -------------------------------------------------------------------
ADMIN_USER=GCFR_APPL_ADMIN_USER
ETL_USER={{PARENT_NODE}}_GCFR_ETL_USR
ETL_USER_ROLE={{PARENT_NODE}}_GCFR_ETL_USR_ROLE


# -------------------------------------------------------------------
# 4. SQL constants  (env-agnostic; override per env only if required)
# -------------------------------------------------------------------
SQL_DATE_FORMAT=YYYY-MM-DD
SQL_HIGH_DATE=9999-09-09
SQL_TEXT_SIZE=31000
CLOB_TEXT_SIZE=1000000000

DATE_FORMAT=FORMAT'YYYY-MM-DD'
HIGH_DATE=DATE'9999-09-09'
DATE_FORMAT1=FORMAT''YYYY-MM-DD''
HIGH_DATE1=DATE''9999-09-09''
TS_TYPE=TIMESTAMP(6)
CURRENT_TS_TYPE=CURRENT_TIMESTAMP(6)
TIME_TYPE=TIME(6)
LINE_FEED='0A'XC

IMGVAL=IMG
INSVAL=INS
GCFR_DELTA_ACTION_CODE=GCFR_Delta_Action_Code
EDW_KEY_COLUMN=EDW_Key
BMAP_UNKNOWN=UNKNOWN


# -------------------------------------------------------------------
# 5. Engine / runtime flags  (legitimately differ per env)
# -------------------------------------------------------------------
JAVA_XSP_SUPPORTED=YES
CUSTOM_EXCEPTION_SUPPORTED_FOR_UNICODE=NO
SQL_SECURITY_PRIVILEGE_OPTION=


# -------------------------------------------------------------------
# 6. Field-length policy  (governance — change with care)
# -------------------------------------------------------------------
DATA_FILE_NAME_LENGTH=100
CTRL_FILE_NAME_LENGTH=100
SRC_FILE_NAME_LENGTH=200


# -------------------------------------------------------------------
# 7. Diagnostic / DI-tool stanzas
# -------------------------------------------------------------------
DIAGNOSTICS_STMT=GET DIAGNOSTICS EXCEPTION 1 vError_Text MESSAGE_TEXT
DS_BT=/*BT; Workaround for DI Tool Transaction Control */
DS_ET=/*ET; Workaround for DI Tool Transaction Control */
GCFR_BB_ERR_GET=G_BB_EG

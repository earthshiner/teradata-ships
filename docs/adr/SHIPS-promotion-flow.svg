<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 0 1280 980" font-family="'Segoe UI',system-ui,-apple-system,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5A6570"/>
    </marker>
    <marker id="arrowAmber" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C77700"/>
    </marker>
  </defs>

  <rect x="-80" y="0" width="1280" height="980" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="40" font-size="23" font-weight="700" fill="#1F2933">SHIPS — Git as the canonical packaging source</text>
  <text x="32" y="64" font-size="14" fill="#5A6570">Build once from one reviewed, tagged commit → package many environments → promote behind gates. Every release traceable to a single SHA.</text>
  <line x1="32" y1="78" x2="1168" y2="78" stroke="#E2E6EA" stroke-width="1"/>

  <!-- ============ PANEL 1 — Offline build ============ -->
  <rect x="30" y="88" width="1140" height="150" rx="10" fill="#FBF5F0" stroke="#F3D9C6" stroke-width="1"/>
  <rect x="30" y="88" width="6" height="150" rx="3" fill="#FF6900"/>
  <text x="52" y="116" font-size="15" font-weight="700" fill="#B14B00">1 · Offline build — deterministic, no database</text>

  <!-- A raw sources -->
  <rect x="50" y="130" width="250" height="86" rx="8" fill="#FFFFFF" stroke="#98A2AD" stroke-width="1.5"/>
  <text x="175" y="158" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">Raw SQL — any provenance</text>
  <text x="175" y="178" font-size="11" fill="#5A6570" text-anchor="middle">generator · hand-authored</text>
  <text x="175" y="194" font-size="11" fill="#5A6570" text-anchor="middle">vendor-converted · TD export</text>

  <line x1="300" y1="173" x2="332" y2="173" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- B SHIPS pipeline -->
  <rect x="336" y="130" width="470" height="86" rx="8" fill="#FFE9D6" stroke="#FF6900" stroke-width="1.8"/>
  <text x="571" y="156" font-size="14" font-weight="700" fill="#B14B00" text-anchor="middle">SHIPS pipeline  (offline)</text>
  <text x="571" y="179" font-size="12.5" fill="#7A4A1E" text-anchor="middle">Scaffold → Harvest → Generate</text>
  <text x="571" y="197" font-size="12.5" fill="#7A4A1E" text-anchor="middle">→ Inspect → Analyse → Scan</text>

  <line x1="806" y1="173" x2="838" y2="173" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- C tokenised payload -->
  <rect x="842" y="130" width="300" height="86" rx="8" fill="#FFFFFF" stroke="#1F9D55" stroke-width="1.8"/>
  <text x="992" y="152" font-size="13" font-weight="700" fill="#157347" text-anchor="middle">Tokenised payload — normal form</text>
  <text x="992" y="170" font-size="11" fill="#5A6570" text-anchor="middle">env-agnostic · eponymous · 1 object / file</text>
  <text x="992" y="186" font-size="11" fill="#5A6570" text-anchor="middle">+ config: ships.yaml · token map</text>
  <text x="992" y="201" font-size="11" fill="#5A6570" text-anchor="middle">· inspect.conf · env/*.conf</text>

  <!-- C -> D connector (git commit) -->
  <path d="M992,216 V246 H150 V300" fill="none" stroke="#2D6CDF" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="160" y="240" font-size="11.5" font-weight="600" fill="#2D6CDF">ships stage → commit  (clean + scan-passing only)</text>

  <!-- ============ PANEL 2 — Commit & review ============ -->
  <rect x="30" y="256" width="1140" height="146" rx="10" fill="#F1F5FC" stroke="#CADBF6" stroke-width="1"/>
  <rect x="30" y="256" width="6" height="146" rx="3" fill="#2D6CDF"/>
  <text x="52" y="284" font-size="15" font-weight="700" fill="#21509E">2 · Commit &amp; review — GitOps</text>

  <!-- D branch -->
  <rect x="50" y="300" width="200" height="74" rx="8" fill="#FFFFFF" stroke="#2D6CDF" stroke-width="1.5"/>
  <text x="150" y="332" font-size="12.5" font-weight="700" fill="#1F2933" text-anchor="middle">Feature branch</text>
  <text x="150" y="350" font-size="11" fill="#5A6570" text-anchor="middle">payload + config committed</text>

  <line x1="250" y1="337" x2="296" y2="337" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- E PR -->
  <rect x="300" y="300" width="210" height="74" rx="8" fill="#FFFFFF" stroke="#2D6CDF" stroke-width="1.5"/>
  <text x="405" y="332" font-size="12.5" font-weight="700" fill="#1F2933" text-anchor="middle">Pull request</text>
  <text x="405" y="350" font-size="11" fill="#5A6570" text-anchor="middle">review the normalised diff</text>

  <line x1="510" y1="337" x2="556" y2="337" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- F merge -->
  <rect x="560" y="300" width="180" height="74" rx="8" fill="#FFFFFF" stroke="#2D6CDF" stroke-width="1.5"/>
  <text x="650" y="332" font-size="12.5" font-weight="700" fill="#1F2933" text-anchor="middle">Merge</text>
  <text x="650" y="350" font-size="11" fill="#5A6570" text-anchor="middle">→ release / main</text>

  <line x1="740" y1="337" x2="796" y2="337" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- G tag (hub) -->
  <rect x="800" y="298" width="300" height="78" rx="8" fill="#E6EEFB" stroke="#21509E" stroke-width="2.4"/>
  <text x="950" y="328" font-size="14" font-weight="700" fill="#21509E" text-anchor="middle">Tag  v1.4.2</text>
  <text x="950" y="348" font-size="11.5" fill="#21509E" text-anchor="middle">canonical packaging source · commit SHA</text>
  <text x="950" y="365" font-size="11" fill="#5A6570" text-anchor="middle">clean tag → READY  ·  dirty tree → READY-WITH-CAVEATS</text>

  <!-- G -> bus (fan origin) -->
  <path d="M950,376 V458" fill="none" stroke="#3B6E7A" stroke-width="1.8"/>

  <!-- ============ PANEL 3 — Package per env ============ -->
  <rect x="30" y="416" width="1140" height="176" rx="10" fill="#EAF3F3" stroke="#C2DCDD" stroke-width="1"/>
  <rect x="30" y="416" width="6" height="176" rx="3" fill="#3B6E7A"/>
  <text x="52" y="444" font-size="15" font-weight="700" fill="#2C5560">3 · Package per environment</text>
  <text x="430" y="444" font-size="12.5" font-style="italic" fill="#3B6E7A">build once  →  package many  (re-verify inspect + trust at package time)</text>

  <!-- distribution bus -->
  <path d="M220,458 H980" fill="none" stroke="#3B6E7A" stroke-width="1.8"/>
  <path d="M220,458 V474" fill="none" stroke="#3B6E7A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M600,458 V474" fill="none" stroke="#3B6E7A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M980,458 V474" fill="none" stroke="#3B6E7A" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- H DEV pkg -->
  <rect x="70" y="476" width="300" height="86" rx="8" fill="#FFFFFF" stroke="#3B6E7A" stroke-width="1.5"/>
  <text x="220" y="503" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">DEV package</text>
  <text x="220" y="522" font-size="11" fill="#5A6570" text-anchor="middle">package --env DEV --source-ref v1.4.2</text>
  <text x="220" y="540" font-size="11" fill="#5A6570" text-anchor="middle">env-bound · signed · SHA-stamped</text>

  <!-- I TST pkg -->
  <rect x="450" y="476" width="300" height="86" rx="8" fill="#FFFFFF" stroke="#3B6E7A" stroke-width="1.5"/>
  <text x="600" y="503" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">TST package</text>
  <text x="600" y="522" font-size="11" fill="#5A6570" text-anchor="middle">package --env TST --source-ref v1.4.2</text>
  <text x="600" y="540" font-size="11" fill="#5A6570" text-anchor="middle">env-bound · signed · SHA-stamped</text>

  <!-- J PRD pkg -->
  <rect x="830" y="476" width="300" height="86" rx="8" fill="#FFFFFF" stroke="#3B6E7A" stroke-width="1.5"/>
  <text x="980" y="503" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">PRD package</text>
  <text x="980" y="522" font-size="11" fill="#5A6570" text-anchor="middle">package --env PRD --source-ref v1.4.2</text>
  <text x="980" y="540" font-size="11" fill="#5A6570" text-anchor="middle">+ four-eyes · change-ref · TLS · signed</text>

  <!-- H/I/J -> K/L/M -->
  <path d="M220,562 V660" fill="none" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M600,562 V660" fill="none" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M980,562 V660" fill="none" stroke="#5A6570" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ PANEL 4 — Promote & deploy ============ -->
  <rect x="30" y="616" width="1140" height="150" rx="10" fill="#ECEEF6" stroke="#CBD2E6" stroke-width="1"/>
  <rect x="30" y="616" width="6" height="150" rx="3" fill="#3A4673"/>
  <text x="52" y="644" font-size="15" font-weight="700" fill="#2C355E">4 · Promote &amp; deploy — gated</text>

  <!-- K deploy DEV -->
  <rect x="70" y="660" width="300" height="80" rx="8" fill="#FFFFFF" stroke="#3A4673" stroke-width="1.5"/>
  <text x="220" y="690" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">Deploy DEV</text>
  <text x="220" y="709" font-size="11" fill="#5A6570" text-anchor="middle">preflight EXPLAIN · waves</text>
  <text x="220" y="725" font-size="11" fill="#5A6570" text-anchor="middle">pre-deploy SHOW capture</text>

  <line x1="370" y1="700" x2="446" y2="700" stroke="#C77700" stroke-width="1.8" marker-end="url(#arrowAmber)"/>
  <text x="408" y="692" font-size="10.5" font-weight="600" fill="#C77700" text-anchor="middle">approve</text>

  <!-- L deploy TST -->
  <rect x="450" y="660" width="300" height="80" rx="8" fill="#FFFFFF" stroke="#3A4673" stroke-width="1.5"/>
  <text x="600" y="690" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">Deploy TST</text>
  <text x="600" y="709" font-size="11" fill="#5A6570" text-anchor="middle">same package family</text>
  <text x="600" y="725" font-size="11" fill="#5A6570" text-anchor="middle">drift check vs last deploy</text>

  <line x1="750" y1="700" x2="826" y2="700" stroke="#C77700" stroke-width="1.8" marker-end="url(#arrowAmber)"/>
  <text x="788" y="692" font-size="10.5" font-weight="600" fill="#C77700" text-anchor="middle">sign-off</text>

  <!-- M deploy PRD -->
  <rect x="830" y="660" width="300" height="80" rx="8" fill="#FFFFFF" stroke="#3A4673" stroke-width="1.5"/>
  <text x="980" y="690" font-size="13" font-weight="700" fill="#1F2933" text-anchor="middle">Deploy PRD</text>
  <text x="980" y="709" font-size="11" fill="#5A6570" text-anchor="middle">four-eyes · change-ref · TLS</text>
  <text x="980" y="725" font-size="11" fill="#5A6570" text-anchor="middle">DBQL + OpenLineage evidence</text>

  <!-- archive -> registry (right-side bus) -->
  <path d="M1130,519 H1162 V820 H1132" fill="none" stroke="#98A2AD" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="1158" y="600" font-size="10.5" fill="#5A6570" text-anchor="end" transform="rotate(90 1158 600)">detokenised archive → store</text>

  <!-- ============ Bottom: commit boundary + registry ============ -->
  <rect x="70" y="792" width="700" height="70" rx="8" fill="#FFFDF5" stroke="#C77700" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="86" y="814" font-size="12.5" font-weight="700" fill="#B14B00">Commit boundary</text>
  <text x="86" y="833" font-size="11.5" fill="#5A6570">IN the branch:  payload/  +  config  (env/*.conf must use Vault refs, never plaintext secrets)</text>
  <text x="86" y="851" font-size="11.5" fill="#5A6570">OUT of the branch → registry:  detokenised, env-bound, signed release archives</text>

  <rect x="800" y="792" width="330" height="70" rx="8" fill="#EEF0F2" stroke="#98A2AD" stroke-width="1.5"/>
  <text x="965" y="822" font-size="12.5" font-weight="700" fill="#1F2933" text-anchor="middle">Release registry / artifact store</text>
  <text x="965" y="841" font-size="11" fill="#5A6570" text-anchor="middle">detokenised archives — off the source branch</text>

  <!-- rollback loop (far left, dashed) -->
  <path d="M70,700 H-30 V520 H66" fill="none" stroke="#C77700" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowAmber)"/>
  <text x="-50" y="610" font-size="12" font-weight="700" fill="#C77700" text-anchor="middle" transform="rotate(-90 -50 610)">feature rollback:  ships rollback --to-tag</text>

  <!-- ============ Legend ============ -->
  <line x1="32" y1="892" x2="1168" y2="892" stroke="#E2E6EA" stroke-width="1"/>
  <g font-size="11" fill="#5A6570">
    <rect x="70" y="908" width="14" height="14" rx="3" fill="#FFE9D6" stroke="#FF6900"/>
    <text x="90" y="919">SHIPS deterministic core</text>
    <rect x="262" y="908" width="14" height="14" rx="3" fill="#E6EEFB" stroke="#2D6CDF"/>
    <text x="282" y="919">Git / review</text>
    <rect x="390" y="908" width="14" height="14" rx="3" fill="#FFFFFF" stroke="#3B6E7A"/>
    <text x="410" y="919">Package (per env)</text>
    <rect x="548" y="908" width="14" height="14" rx="3" fill="#FFFFFF" stroke="#3A4673"/>
    <text x="568" y="919">Deploy</text>
    <line x1="650" y1="915" x2="690" y2="915" stroke="#C77700" stroke-width="1.8" stroke-dasharray="6 4"/>
    <text x="698" y="919">Gate / approval / rollback</text>
    <rect x="900" y="908" width="14" height="14" rx="3" fill="#EEF0F2" stroke="#98A2AD"/>
    <text x="920" y="919">Storage (off-branch)</text>
  </g>
</svg>

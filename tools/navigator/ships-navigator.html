<!doctype html>
<!--
  SHIPS Navigator — offline guided-packaging wizard
  Issue #380 / milestone "Guided Packaging (SHIPS Navigator)"

  Hard constraints (handover Part B §2):
    - Single self-contained .html file. No network, no CDN, no AI.
    - Pure client-side, deterministic.
    - Output is copy-pasteable AND downloadable.

  v1.1 changes vs v1:
    - Fixed CLI flags to match the real ships CLI (--project not --path,
      --env / --env-config / --name on package, etc.).
    - New questions for generate, analyse, dependency-graph (OpenLineage),
      scan, strict mode, package name.
    - Mode toggle: Quick (one `ships process` call) vs Detailed (each step).
    - bootstrap-env-config offered when source is already tokenised.
    - Answers persist to localStorage; Download-all bundle (vanilla JS ZIP);
      inline validation; glossary tab + abbr tooltips.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHIPS Navigator</title>
<!-- Issue #485 — orange "N" disc favicon. Mirrors the Navigator
     variant in src/td_release_packager/reporting/common.py FAVICON_KINDS
     so the visual family stays in lockstep across all SHIPS HTML
     surfaces. Inline SVG data URI — no external request. -->

<style>
  :root {
    --td-orange: #FF5F02;
    --td-navy:   #00233C;
    --td-white:  #FFFFFF;
    --td-grey-1: #f4f6f8;
    --td-grey-2: #d8dde2;
    --td-grey-3: #6b7a86;
    --td-warn-bg:#fff4e6;
    --td-warn-bd:#FF5F02;
    --td-info-bg:#eef4fa;
    --td-info-bd:#00233C;
    --td-mono:   ui-monospace, 'Cascadia Mono', 'Consolas', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: var(--td-navy);
    background: var(--td-grey-1);
    line-height: 1.45;
  }
  header.app {
    background: var(--td-navy);
    color: var(--td-white);
    padding: 18px 28px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 4px solid var(--td-orange);
  }
  header.app .logo {
    /* Embedded teradata_sym_rgb_pos.png (base64) from the teradata-brand skill's
       assets/logo-base64-reference.md. Per brand guidelines we use the provided
       asset rather than recreating the mark. Native size 64x85 (aspect ~0.75). */
    height: 40px;
    width: auto;
    display: block;
  }
  header.app h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header.app .sub { opacity: 0.75; font-size: 13px; margin-left: auto; }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 80px);
  }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

  section.questions, section.outputs {
    padding: 24px 28px;
    overflow-y: auto;
  }
  section.questions { background: var(--td-white); border-right: 1px solid var(--td-grey-2); }
  section.outputs { background: var(--td-grey-1); }

  h2 {
    font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--td-grey-3); margin: 0 0 14px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .question {
    margin-bottom: 16px;
    padding: 14px 16px;
    background: var(--td-white);
    border: 1px solid var(--td-grey-2);
    border-left: 3px solid var(--td-orange);
    border-radius: 4px;
  }
  .question .qlabel { font-weight: 600; margin-bottom: 6px; display: block; }
  .question .qhint { font-size: 12px; color: var(--td-grey-3); margin-bottom: 10px; }
  .question .qhint abbr { border-bottom: 1px dotted var(--td-grey-3); cursor: help; text-decoration: none; }
  .question input[type=text], .question input[type=url], .question select, .question textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--td-grey-2);
    border-radius: 3px;
    font: inherit;
    color: var(--td-navy);
    background: var(--td-white);
  }
  .question input:focus, .question select:focus, .question textarea:focus {
    outline: 2px solid var(--td-orange); outline-offset: 0;
  }
  .radios { display: flex; flex-wrap: wrap; gap: 8px; }
  .radios label {
    flex: 1 1 auto;
    padding: 8px 12px;
    border: 1px solid var(--td-grey-2);
    border-radius: 3px;
    cursor: pointer;
    background: var(--td-white);
    text-align: center;
    font-size: 13px;
  }
  .radios label.active {
    background: var(--td-navy);
    color: var(--td-white);
    border-color: var(--td-navy);
  }
  .radios input { display: none; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; }

  .warn, .info {
    margin: 6px 0 0;
    padding: 8px 10px;
    font-size: 12px;
  }
  .warn { background: var(--td-warn-bg); border-left: 3px solid var(--td-warn-bd); }
  .info { background: var(--td-info-bg); border-left: 3px solid var(--td-info-bd); }

  .issues {
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--td-warn-bg);
    border-left: 3px solid var(--td-warn-bd);
    border-radius: 3px;
    font-size: 12px;
  }
  .issues ul { margin: 6px 0 0 18px; padding: 0; }
  .issues li { margin-bottom: 4px; }
  .issues.empty { display: none; }

  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--td-navy); flex-wrap: wrap; }
  .tabs button {
    background: var(--td-grey-1);
    color: var(--td-navy);
    border: 1px solid var(--td-grey-2);
    border-bottom: none;
    padding: 9px 13px;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    border-radius: 3px 3px 0 0;
    margin-right: 4px;
  }
  .tabs button.active { background: var(--td-navy); color: var(--td-white); border-color: var(--td-navy); }
  .panel {
    display: none;
    background: var(--td-white);
    border: 1px solid var(--td-grey-2);
    border-top: none;
    padding: 16px;
  }
  .panel.active { display: block; }
  .panel pre {
    margin: 0; padding: 12px;
    background: var(--td-navy); color: var(--td-white);
    font-family: var(--td-mono); font-size: 12.5px; line-height: 1.55;
    overflow-x: auto; border-radius: 3px;
    white-space: pre-wrap; word-break: break-word;
  }
  .panel .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--td-orange); color: var(--td-navy);
    border: none; padding: 8px 14px; font: inherit;
    font-weight: 600; font-size: 13px; border-radius: 3px; cursor: pointer;
  }
  .btn.secondary { background: var(--td-white); color: var(--td-navy); border: 1px solid var(--td-navy); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.small { padding: 6px 10px; font-size: 12px; }

  .file-block { margin-bottom: 18px; }
  .file-block h3 {
    margin: 0 0 6px; font-size: 13px; color: var(--td-navy);
    font-family: var(--td-mono);
  }
  .rationale ol { padding-left: 20px; }
  .rationale li { margin-bottom: 10px; }
  .rationale strong { color: var(--td-orange); }
  .empty { color: var(--td-grey-3); font-style: italic; padding: 20px 0; text-align: center; }
  .plan-import {
    margin-bottom: 14px; padding: 10px; background: var(--td-grey-1);
    border: 1px dashed var(--td-grey-2); border-radius: 3px;
  }
  .plan-import summary { cursor: pointer; font-weight: 600; font-size: 13px; }
  .plan-import textarea { margin-top: 8px; width: 100%; min-height: 60px; font: inherit; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .glossary dt { font-weight: 600; color: var(--td-orange); margin-top: 10px; }
  .glossary dd { margin: 4px 0 8px 0; font-size: 13px; }
  .faq h3 { font-size: 14px; color: var(--td-navy); margin: 20px 0 6px; }
  .faq h3:first-of-type { margin-top: 4px; }
  .faq p { margin: 6px 0; font-size: 13px; line-height: 1.55; }
  .faq code { background: var(--td-grey-1); padding: 1px 4px; border-radius: 3px; font-family: var(--td-mono); font-size: 12px; }
  .faq pre code { background: none; padding: 0; color: inherit; }
  .anatomy details { margin-left: 0; }
  .anatomy details details { margin-left: 18px; border-left: 1px dotted var(--td-grey-2); padding-left: 10px; }
  .anatomy summary {
    cursor: pointer; padding: 4px 0;
    font-family: var(--td-mono); font-size: 13px; color: var(--td-navy);
  }
  .anatomy summary:hover { color: var(--td-orange); }
  .anatomy .leaf {
    padding: 4px 0 4px 18px;
    font-family: var(--td-mono); font-size: 13px; color: var(--td-navy);
  }
  .anatomy .leaf::before { content: "▫ "; color: var(--td-orange); }
  .anatomy .desc {
    font-family: inherit; color: var(--td-grey-3); font-size: 12px;
    margin: 2px 0 8px 22px; line-height: 1.4;
  }
</style>
</head>

<script>
"use strict";

// Single source of truth for the app name (handover §1).
const APP_NAME = "SHIPS Navigator";
document.getElementById("app-title").textContent = APP_NAME;
document.title = APP_NAME;

const STORAGE_KEY = "ships-navigator-v1";

// ---------------------------------------------------------------------------
// Decision model (handover Part B §3, extended).
//
// The authoritative model now lives in tools/navigator/decision-tree.yaml
// (issue #378) — the single source of truth shared with the CLI wizard and AI
// skill. This inline QUESTIONS array is the wizard's offline embedding of that
// model (the single-file wizard must run with no network / no file reads). A
// test (src/tests/test_decision_tree.py::TestLockstep) fails the build if the
// two drift, so edit the YAML and mirror the change here in the same commit.
// ---------------------------------------------------------------------------
const QUESTIONS = [
  // Mode toggle — first so the user picks which command shape they want.
  {
    id: "mode.style",
    label: "How should I show the SHIPS commands?",
    hint: "<b>Quick</b> emits one <code>ships process</code> call per env (recommended for first-timers). <b>Detailed</b> shows each step (scaffold/harvest/generate/inspect/scan/analyse/package) for transparency or CI scripts.",
    kind: "radio",
    options: [
      { value: "quick",    label: "Quick (process)" },
      { value: "detailed", label: "Detailed (each step)" },
    ],
  },

  // --- Q1 source ---
  {
    id: "source.type",
    label: "Q1. Where does your source come from?",
    hint: "GitHub means SHIPS clones into a temp work dir; filesystem reads from disk.",
    kind: "radio",
    options: [
      { value: "github",     label: "GitHub" },
      { value: "filesystem", label: "Filesystem" },
    ],
  },
  { id: "source.owner_repo", label: "GitHub owner/repo", hint: "e.g. acme/customer-dna", kind: "text",
    show: a => a["source.type"] === "github" },
  { id: "source.ref", label: "GitHub ref (branch/tag/sha)", hint: "Defaults to <code>main</code> if blank.", kind: "text",
    show: a => a["source.type"] === "github" },
  { id: "source.dir", label: "Absolute path to source DDL", hint: "e.g. C:\\src\\customer-dna or /home/me/customer-dna", kind: "text",
    show: a => a["source.type"] === "filesystem" },

  // --- Q2 already tokenised ---
  {
    id: "tokens.already",
    label: "Q2. Does the source already use <code>{{TOKEN}}</code> placeholders?",
    hint: "Yes = harvest as-is; the wizard will run <code>bootstrap-env-config</code> to seed env files from the tokens already in the source. No / unsure = wizard configures tokenisation.",
    kind: "radio",
    options: [
      { value: "yes",    label: "Yes" },
      { value: "no",     label: "No" },
      { value: "unsure", label: "Unsure" },
    ],
  },

  // --- Q3 token shape ---
  {
    id: "tokens.model",
    label: "Q3. Token shape",
    hint: "<b>Prefix</b>: one product token (one env binding). <b>Per-database</b>: one binding per database.",
    kind: "radio",
    options: [
      { value: "prefix",       label: "Prefix (one DB_PREFIX)" },
      { value: "per_database", label: "Per-database (one token per db)" },
    ],
    show: a => a["tokens.already"] && a["tokens.already"] !== "yes",
  },

  // --- Q4 prefix ---
  {
    id: "tokens.prefix",
    label: "Q4. Product prefix",
    hint: "Bare prefix without trailing underscore. e.g. <code>CustomerDNA</code>.",
    kind: "text",
    show: a => a["tokens.already"] && a["tokens.already"] !== "yes",
  },

  // --- Q5 atomic + eponymous ---
  {
    id: "atomic.eponymous",
    label: "Q5. Is DDL already <abbr title='one object per file'>atomic</abbr> &amp; <abbr title='filename matches DB.Object.ext'>eponymous</abbr>?",
    hint: "Atomic = one object per file. Eponymous = filename matches <code>DB.Object.ext</code>.",
    kind: "radio",
    options: [
      { value: "yes",    label: "Yes" },
      { value: "no",     label: "No — let SHIPS split + rename" },
      { value: "unsure", label: "Unsure" },
    ],
    warnOn: v => (v === "no" || v === "unsure")
      ? "No problem: SHIPS auto-splits multi-object files into one atomic object per file — tables, views, and compound objects (stored procedures, macros, triggers, functions) alike — and names each file eponymously. Anything it genuinely can't parse confidently is left whole and flagged by inspect's one_object rule."
      : null,
  },

  // --- NEW Q6 generate (view-layer) ---
  {
    id: "generate.enabled",
    label: "Q6. Generate a <abbr title='locking views, access views, business views (STD_V / ACL_V / BUS_V)'>view layer</abbr>?",
    hint: "If your tables have companion views per the object-placement standard, SHIPS can auto-generate them. Skip if you author all views by hand or your source already includes them.",
    kind: "radio",
    options: [
      { value: "yes",    label: "Yes — auto-generate" },
      { value: "no",     label: "No — base tables only" },
      { value: "unsure", label: "Unsure (defaults to Yes)" },
    ],
  },

  // --- NEW Q7 analyse (waves) ---
  {
    id: "analyse.enabled",
    label: "Q7. Compute deploy <abbr title='ordered batches of objects with no intra-batch dependencies'>waves</abbr> (dependency analysis)?",
    hint: "SHIPS reads cross-object dependencies and emits <code>_waves.txt</code> so DDL deploys in the right order. Recommended unless you maintain your own ordering.",
    kind: "radio",
    options: [
      { value: "yes", label: "Yes (recommended)" },
      { value: "no",  label: "No" },
    ],
  },

  // --- NEW Q8 dependency graph ---
  {
    id: "analyse.graph",
    label: "Q8. Export a dependency graph (incl. <abbr title='OpenLineage is an open standard for data lineage events'>OpenLineage</abbr>)?",
    hint: "Emits dependency graph files (incl. OpenLineage JSON) under <code>&lt;project&gt;/graphs/</code>. Useful for impact analysis or feeding a lineage tool. Off by default.",
    kind: "radio",
    options: [
      { value: "no",  label: "No" },
      { value: "yes", label: "Yes — export graph files" },
    ],
    show: a => a["analyse.enabled"] !== "no",
  },
  { id: "analyse.namespace", label: "OpenLineage namespace",
    hint: "Defaults to <code>teradata://ships-analysis</code>. For a live system use <code>teradata://hostname:1025</code>.",
    kind: "text", show: a => a["analyse.graph"] === "yes" },
  { id: "analyse.projectName", label: "OpenLineage project name",
    hint: "Defaults to <code>ships-project</code>.",
    kind: "text", show: a => a["analyse.graph"] === "yes" },

  // --- NEW Q9 scan ---
  {
    id: "scan.enabled",
    label: "Q9. Add an orphan-token scan?",
    hint: "Catches tokens defined in env files but never used in the payload (CI gate for clean env configs). <code>inspect</code> already validates coverage the other way.",
    kind: "radio",
    options: [
      { value: "no",  label: "No" },
      { value: "yes", label: "Yes — fail on orphan tokens" },
    ],
  },

  // --- Q10 envs ---
  { id: "envs", label: "Q10. Target environments",
    hint: "Comma- or space-separated. e.g. <code>DEV, TST, PRD</code>.",
    kind: "text" },

  // --- External parent databases → env-config EXTERNAL_PARENTS ---
  // Only meaningful when the wizard writes the env skeletons (the
  // not-already-tokenised path). Stops the build's environment-prereq
  // trust gate flagging platform-owned parents as needing DBA review.
  { id: "env.externalParents",
    label: "External parent databases (optional)",
    hint: "Comma-separated. Parent databases/users that <b>already exist</b> in the target and are " +
          "NOT created by this package — e.g. the <code>FROM</code> parent in " +
          "<code>CREATE DATABASE Child FROM DATAPRODUCTS</code>. Written as " +
          "<code>EXTERNAL_PARENTS=…</code> into each generated env file so the build's trust gate " +
          "doesn't block them with <code>environment_prereq_requires_dba_review</code>. " +
          "Leave blank if your package creates every database it references.",
    kind: "text",
    show: a => a["tokens.already"] !== "yes" },

  // --- Q11 project path + scaffold flag ---
  { id: "project.dir", label: "Q11. Absolute path to your SHIPS project",
    hint: "e.g. <code>C:\\projects\\customer-dna-ships</code>. Drive letter implies Windows <code>.bat</code> output.",
    kind: "text" },
  { id: "project.scaffolded", label: "Project already scaffolded?",
    hint: "Tick if the project layout already exists. If unticked, <code>scaffold</code> runs first using the basename as the project name.",
    kind: "checkbox" },

  // --- Q12 package name ---
  { id: "package.name", label: "Q12. Package name",
    hint: "Build artefact name. e.g. <code>create_objects</code>. No spaces; underscores OK.",
    kind: "text" },

  // --- Strict mode toggle ---
  { id: "process.strict", label: "Strict mode (abort on first stage error)?",
    hint: "Off by default — developer mode runs all stages and summarises errors at the end. Tick for CI / platform mode.",
    kind: "checkbox" },

  // --- Bash-flavour for Windows paths in the emitted .sh ---
  // Only relevant when the project dir looks Windows-shaped — on POSIX
  // there are no drive letters or backslashes for the bash render to
  // translate. The transformation lives in renderScript(); the only
  // reason to ask is to pick the right `C:\` prefix substitution.
  {
    id: "bash.flavour",
    label: "Bash path style for the emitted <code>.sh</code>",
    hint: "Windows paths can't be expressed in a POSIX shell without translation. " +
          "<b>Git Bash / MSYS2</b> uses <code>/c/...</code> (default — most common). " +
          "<b>WSL</b> uses <code>/mnt/c/...</code>. " +
          "<b>Cygwin</b> uses <code>/cygdrive/c/...</code>. " +
          "The PowerShell and cmd outputs are unaffected.",
    kind: "radio",
    options: [
      { value: "gitbash", label: "Git Bash / MSYS2 (/c/...)" },
      { value: "wsl",     label: "WSL (/mnt/c/...)" },
      { value: "cygwin",  label: "Cygwin (/cygdrive/c/...)" },
    ],
    show: () => targetOs() === "windows",
  },
];

// ---------------------------------------------------------------------------
// State + persistence.
// ---------------------------------------------------------------------------
const answers = {};
let activeTab = "commands";

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers, activeTab })); }
  catch (e) { /* file:// may block localStorage in some browsers — silently no-op */ }
}
function hydrate() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && s.answers && typeof s.answers === "object") Object.assign(answers, s.answers);
    if (s && typeof s.activeTab === "string") activeTab = s.activeTab;
  } catch (e) { /* ignore */ }
}

function applyPlan(plan) {
  // Best-effort plan.json → answers mapping. Unknown keys ignored.
  if (plan.mode) answers["mode.style"] = plan.mode;
  if (plan.source) {
    if (plan.source.type) answers["source.type"] = plan.source.type;
    if (plan.source.owner_repo) answers["source.owner_repo"] = plan.source.owner_repo;
    if (plan.source.ref) answers["source.ref"] = plan.source.ref;
    if (plan.source.dir || plan.source.path) answers["source.dir"] = plan.source.dir || plan.source.path;
  }
  if (plan.tokens) {
    if (plan.tokens.already) answers["tokens.already"] = plan.tokens.already;
    if (plan.tokens.model) answers["tokens.model"] = plan.tokens.model;
    if (plan.tokens.prefix) answers["tokens.prefix"] = plan.tokens.prefix;
  }
  if (plan.atomic && plan.atomic.eponymous) answers["atomic.eponymous"] = plan.atomic.eponymous;
  if (plan.generate && plan.generate.enabled) answers["generate.enabled"] = plan.generate.enabled;
  if (plan.analyse) {
    if (plan.analyse.enabled) answers["analyse.enabled"] = plan.analyse.enabled;
    if (typeof plan.analyse.graph === "string") answers["analyse.graph"] = plan.analyse.graph;
    if (plan.analyse.namespace) answers["analyse.namespace"] = plan.analyse.namespace;
    if (plan.analyse.projectName) answers["analyse.projectName"] = plan.analyse.projectName;
  }
  if (plan.scan && plan.scan.enabled) answers["scan.enabled"] = plan.scan.enabled;
  if (Array.isArray(plan.envs)) answers["envs"] = plan.envs.join(", ");
  else if (typeof plan.envs === "string") answers["envs"] = plan.envs;
  if (Array.isArray(plan.externalParents)) answers["env.externalParents"] = plan.externalParents.join(", ");
  else if (typeof plan.externalParents === "string") answers["env.externalParents"] = plan.externalParents;
  if (plan.project) {
    if (plan.project.dir || plan.project.path) answers["project.dir"] = plan.project.dir || plan.project.path;
    if (typeof plan.project.scaffolded === "boolean") answers["project.scaffolded"] = plan.project.scaffolded;
  }
  if (plan.package && plan.package.name) answers["package.name"] = plan.package.name;
  if (typeof plan.strict === "boolean") answers["process.strict"] = plan.strict;
}

// ---------------------------------------------------------------------------
// Helpers — paths, quoting, env parsing.
// ---------------------------------------------------------------------------
function isWindowsPath(p) { return !!p && /^[A-Za-z]:[\\/]/.test(p); }
function targetOs() { return isWindowsPath(answers["project.dir"]) ? "windows" : "posix"; }
function parentDir(p) {
  if (!p) return ".";
  const i = Math.max(p.lastIndexOf("/"), p.lastIndexOf("\\"));
  return i > 0 ? p.slice(0, i) : ".";
}
function baseName(p) {
  if (!p) return "ships-project";
  const trimmed = p.replace(/[\\/]+$/, "");
  const i = Math.max(trimmed.lastIndexOf("/"), trimmed.lastIndexOf("\\"));
  return i >= 0 ? trimmed.slice(i + 1) : trimmed;
}
// Build a filesystem-safe launcher stem from a package name (issue #485).
// Multiple SHIPS projects in the same directory collide if every Navigator
// run writes the same `ships-run.ps1` / `.sh` / `.bat`, so the bundled
// launchers are named `ships-run-<sanitisedPkg>.*` instead.
// Sanitiser rules: keep ASCII alnum / `_` / `-`, replace everything else
// with `_`, collapse runs, trim leading/trailing `_`, fall back to
// "package" if the input collapses to empty.
function safeLauncherStem(pkgName) {
  if (pkgName == null) return "ships-run-package";
  let cleaned = String(pkgName).replace(/[^A-Za-z0-9_-]+/g, "_");
  cleaned = cleaned.replace(/_+/g, "_").replace(/^_+|_+$/g, "");
  if (!cleaned) cleaned = "package";
  return "ships-run-" + cleaned;
}
function parseEnvs(raw) {
  if (!raw) return [];
  return raw.split(/[\s,;]+/).map(s => s.trim()).filter(Boolean);
}
function q(s) {
  if (s == null || s === "") return '""';
  return /\s/.test(s) ? `"${s}"` : s;
}

// ---------------------------------------------------------------------------
// Validation — surfaced as a banner above the outputs.
// ---------------------------------------------------------------------------
function validate(a) {
  const issues = [];
  if (a["source.type"] === "github" && !a["source.owner_repo"])
    issues.push("GitHub owner/repo is empty.");
  if (a["source.type"] === "filesystem" && !a["source.dir"])
    issues.push("Source directory is empty.");
  if (a["tokens.prefix"] && /_$/.test(a["tokens.prefix"]))
    issues.push("Prefix has a trailing underscore — strip it. The tokenise rule adds the underscore.");
  if (a["tokens.prefix"] && !/^[A-Za-z][A-Za-z0-9]*$/.test(a["tokens.prefix"]))
    issues.push("Prefix should be alphanumeric and start with a letter.");
  if (a["project.dir"] && !/^([A-Za-z]:[\\/]|\/)/.test(a["project.dir"]))
    issues.push("Project path doesn't look absolute (expected a drive letter or leading /).");
  if (a["envs"] && parseEnvs(a["envs"]).length === 0)
    issues.push("Could not parse any environment names from the env list.");
  if (a["package.name"] && /\s/.test(a["package.name"]))
    issues.push("Package name should have no spaces — use underscores.");
  if (a["mode.style"] === "detailed" && a["source.type"] === "github")
    issues.push("Detailed mode emits `ships harvest`, which does NOT accept --source-github. Switch to Quick mode, or git-clone the repo first and use a filesystem path.");
  return issues;
}

// ---------------------------------------------------------------------------
// Plan generator.
// ---------------------------------------------------------------------------
function generatePlan() {
  const a = answers;
  const os = targetOs();

  const projDir   = a["project.dir"] || "<project-dir>";
  const parent    = parentDir(projDir);
  const projName  = baseName(projDir);

  const envs      = parseEnvs(a["envs"]);
  const envList   = envs.length ? envs : ["DEV"];
  const needsScaffold = !a["project.scaffolded"];
  const tokensAlready = a["tokens.already"] === "yes";
  const tokenModel    = tokensAlready ? null : (a["tokens.model"] || null);
  const prefix        = (a["tokens.prefix"] || "").trim();
  const sourceType    = a["source.type"];
  const sourceDir     = a["source.dir"] || "<source-dir>";
  const ownerRepo     = (a["source.owner_repo"] || "<owner/repo>").trim();
  const ref           = (a["source.ref"] || "main").trim();
  const pkgName       = (a["package.name"] || "create_objects").trim();
  const mode          = a["mode.style"] || "quick";
  const wantGenerate  = a["generate.enabled"] !== "no";
  const wantAnalyse   = a["analyse.enabled"] !== "no";
  const wantGraph     = a["analyse.graph"] === "yes" && wantAnalyse;
  const namespace     = (a["analyse.namespace"] || "teradata://ships-analysis").trim();
  const projectName   = (a["analyse.projectName"] || "ships-project").trim();
  const wantScan      = a["scan.enabled"] === "yes";
  const wantStrict    = !!a["process.strict"];
  // EXTERNAL_PARENTS for the env skeletons — split on comma/space/semicolon
  // and re-join with commas so the emitted line is canonical regardless of
  // how the user typed the list.
  const externalParents = parseEnvs(a["env.externalParents"]).join(",");

  // ============ Build a shell-agnostic script model ============
  // Long paths are bound to vars once and reused across commands. Each per-env
  // block resets ENV + ENV_CONFIG so users can run the per-env section
  // standalone in a fresh terminal (Option A — simple over clever).
  const sep = os === "windows" ? "\\" : "/";
  const sourceLit = sourceType === "filesystem" ? sourceDir
                  : sourceType === "github"     ? "<cloned-source-dir>"
                  : "<source-dir>";

  const sharedVars = [["SOURCE", sourceLit]];
  if (sourceType === "github") {
    sharedVars.push(["OWNER_REPO", ownerRepo]);
    sharedVars.push(["REF",        ref]);
  }
  sharedVars.push(["OUTPUT_ROOT", parent]);
  sharedVars.push(["NAME",        projName]);
  sharedVars.push(["PROJECT",     `$OUTPUT_ROOT${sep}$NAME`]);
  sharedVars.push(["PKG_NAME",    pkgName]);
  // Pin the package output dir. Without --output, `ships package`/`process`
  // default to the CURRENT directory — so running the script from anywhere
  // other than the project (e.g. the SHIPS repo) drops the release there.
  // <project>/releases is the documented home and is git-ignored by default.
  sharedVars.push(["RELEASES",    `$PROJECT${sep}releases`]);
  if (wantGraph) sharedVars.push(["GRAPHS_DIR", `$PROJECT${sep}graphs`]);
  sharedVars.push(["AUTHOR",      ""]);
  sharedVars.push(["DESCRIPTION", "SHIPS Packaged release"]);

  const deployVars = [
    ["DB_HOST", "<your-teradata-host>"],
    ["DB_USER", "<your-teradata-user>"],
  ];

  const prelude = [];
  const rationale = [];
  if (needsScaffold) {
    const sc = [`ships scaffold --name "$NAME" --output "$OUTPUT_ROOT"`];
    if (envs.length) sc.push(`--environments ${envs.join(",")}`);
    prelude.push(sc);
    rationale.push({ step: "scaffold", why: "Creates the SHIPS project layout (config/, payload/, db/) at $PROJECT with starter env files." });
  }

  const headNotes = [];
  if (mode === "detailed" && sourceType === "github") {
    headNotes.push("`ships harvest` does NOT accept --source-github.");
    headNotes.push("Either git-clone the repo first and point $SOURCE at the clone,");
    headNotes.push("OR switch to Quick mode (`ships process` accepts --source-github).");
  }

  const perEnv = envList.map((env, idx) => {
    const vars = [
      ["ENV",        env],
      ["ENV_CONFIG", `$PROJECT${sep}config${sep}env${sep}$ENV.conf`],
    ];
    const commands = [];

    if (tokensAlready) {
      commands.push([`ships bootstrap-env-config --source "$PROJECT" --env "$ENV"`]);
    }

    if (mode === "quick") {
      const pr = [`ships process --project "$PROJECT"`];
      if (sourceType === "github") {
        pr.push(`--source-github "$OWNER_REPO"`);
        pr.push(`--source-ref "$REF"`);
      } else {
        pr.push(`--source "$SOURCE"`);
      }
      if (!tokensAlready && tokenModel === "prefix") {
        pr.push(`--prefix-token ${prefix || "<PREFIX>"}=DB_PREFIX`);
      }
      if (!wantGenerate) pr.push(`--skip-generate`);
      pr.push(`--env "$ENV"`);
      pr.push(`--env-config "$ENV_CONFIG"`);
      pr.push(`--name "$PKG_NAME"`);
      pr.push(`--output "$RELEASES"`);
      if (wantStrict) pr.push(`--strict`);
      commands.push(pr);
    } else {
      // Detailed: harvest/generate/inspect/scan/analyse are env-agnostic so
      // they only appear in the FIRST env block; package runs in every env block.
      if (idx === 0) {
        const h = [`ships harvest --source "$SOURCE" --project "$PROJECT"`];
        if (!tokensAlready && tokenModel === "prefix") {
          h.push(`--prefix-token ${prefix || "<PREFIX>"}=DB_PREFIX`);
        }
        commands.push(h);
        if (wantGenerate) commands.push([`ships generate --project "$PROJECT"`]);
        commands.push([`ships inspect --project "$PROJECT"`]);
        if (wantScan) commands.push([`ships scan --project "$PROJECT" --all-envs --fail-on-orphan`]);
        if (wantAnalyse) {
          const az = [`ships analyse --project "$PROJECT"`];
          if (wantGraph) {
            az.push(`--graph "$GRAPHS_DIR"`);
            az.push(`--namespace "${namespace}"`);
            az.push(`--project-name "${projectName}"`);
          }
          commands.push(az);
        }
      }
      commands.push([
        `ships package --project "$PROJECT"`,
        `--env "$ENV"`,
        `--name "$PKG_NAME"`,
        `--env-config "$ENV_CONFIG"`,
        `--output "$RELEASES"`,
      ]);
    }

    return { env, vars, commands };
  });

  const postlude = [];
  if (mode === "quick") {
    if (wantScan)  postlude.push([`ships scan --project "$PROJECT" --all-envs --fail-on-orphan`]);
    if (wantGraph) postlude.push([
      `ships analyse --project "$PROJECT"`,
      `--graph "$GRAPHS_DIR"`,
      `--namespace "${namespace}"`,
      `--project-name "${projectName}"`,
    ]);
  }

  // Rationale lines in the order steps appear in the script.
  if (tokensAlready) {
    rationale.push({ step: "bootstrap-env-config", why: "Source already uses {{TOKEN}}. Scans the payload for every token reference and seeds a per-env .conf with placeholders for you to fill in — safer than guessing the token list." });
  }
  if (mode === "quick") {
    rationale.push({
      step: "process",
      why: `Runs harvest → ${wantGenerate ? "generate → " : ""}inspect → ${wantAnalyse ? "analyse → " : ""}package as one orchestrated call per environment, with every stage decision recorded in ships.decisions.json. ${wantStrict ? "Strict mode aborts on the first failing stage." : "Developer mode (default) continues past warnings and summarises errors at the end."}`,
    });
    if (postlude.length) {
      rationale.push({ step: "follow-ups", why: "Orphan-token scanning and graph export sit outside `process` — run them on demand after the pipeline succeeds." });
    }
  } else {
    rationale.push({
      step: "harvest",
      why: tokensAlready
        ? "Source is already tokenised; harvest copies into payload/ as-is."
        : tokenModel === "prefix"
          ? `Applies the prefix-token rule: '${prefix || "<PREFIX>"}_' becomes '{{DB_PREFIX}}_' in both file contents and filenames (eponymy preserved).`
          : tokenModel === "per_database"
            ? "Reads config/tokenise.conf and produces per-database tokens like {{DOM_STD_T}}, applied to content and filenames."
            : "Cleans payload/ and copies the source in. Pick a tokenisation mode in Q2/Q3 before running.",
    });
    if (wantGenerate) rationale.push({ step: "generate", why: "Builds view-layer DDL from the harvested base tables, following the object-placement standard." });
    rationale.push({ step: "inspect", why: "Runs Step 0 lint + Step 0b token-coverage. Auto-loads config/inspect.conf. NEVER pass an env file behind --config." });
    if (wantScan) rationale.push({ step: "scan", why: "Validates every {{TOKEN}} reference against every env .conf, and fails if a defined token is never referenced (orphan)." });
    if (wantAnalyse) rationale.push({
      step: "analyse",
      why: wantGraph
        ? "Computes deploy waves AND exports dependency graph files (incl. OpenLineage JSON) under $GRAPHS_DIR."
        : "Computes deploy waves from cross-object dependencies and emits _waves.txt so DDL deploys in the right order.",
    });
    rationale.push({ step: "package", why: "Builds the deployable release artefact per environment, resolving every {{TOKEN}} from that env's .conf file." });
  }

  const script = { sharedVars, deployVars, prelude, perEnv, postlude, headNotes, mode };

  // ---- tokenise.conf ----
  let tokeniseConf = null;
  if (!tokensAlready && tokenModel) {
    tokeniseConf = makeTokeniseConf(tokenModel, prefix || "<PREFIX>");
  }

  // ---- env skeletons (only when NOT already tokenised) ----
  const envFiles = [];
  if (!tokensAlready) {
    for (const e of envList) {
      envFiles.push({ name: `config/env/${e}.conf`, body: makeEnvConf(e, tokenModel, prefix, externalParents) });
    }
  }

  // ---- ships.yaml packaging profile (#382) ----
  // Persists the packaging decisions so `ships process --project .` re-runs
  // argless (consumed by the single front door, #384). Token model / prefix
  // live in config/tokenise.conf (emitted separately).
  const shipsYaml = makeShipsYaml({
    projName, envList, sourceType, sourceDir, pkgName,
  });

  // ---- Guardrails (handover §6 + var-reuse note) ----
  const guardrails = [
    "Step 0b coverage requires every token referenced by the payload (content AND filenames) to be bound in every env file.",
    "config/inspect.conf is rule=SEVERITY; config/env/<ENV>.conf is TOKEN=value. Never pass an env file behind inspect --config.",
    "inspect has no --env flag — coverage auto-discovers config/env/*.conf.",
    "harvest cleans payload/ by default. Use --keep-existing only for an overlay re-harvest.",
    "Atomic + eponymous applies to DDL only. DCL is grouped per granted-ON database; DML is kept whole (order preserved).",
    "Parent databases the package references but does not create (CREATE DATABASE Child FROM Parent) must be declared as EXTERNAL_PARENTS in each env file, or the build's trust gate blocks on environment_prereq_requires_dba_review.",
    "ships process is the single front-door for a full pipeline run; scan and graph export sit alongside, not inside it.",
    "Long paths live in shell variables ($PROJECT, $SOURCE, $ENV_CONFIG) — retargeting is a one-line edit at the top of the script.",
  ];

  // bashFlavour picks the C:\ → POSIX prefix substitution in renderScript
  // (Git Bash /c/..., WSL /mnt/c/..., Cygwin /cygdrive/c/...). Default
  // is Git Bash — most common Windows-Bash. Only consulted by the bash
  // renderer; PS and cmd renders ignore it.
  const bashFlavour = a["bash.flavour"] || "gitbash";

  const issues = validate(a);
  return { script, rationale, tokeniseConf, envFiles, shipsYaml, os, bashFlavour, guardrails, issues, mode, tokensAlready, envList, projDir, pkgName };
}

// ---------------------------------------------------------------------------
// Render the script model in a chosen shell.
// shell ∈ { "bash", "powershell", "cmd" }.
// ---------------------------------------------------------------------------
function renderScript(script, shell, bashFlavour, launcherStem) {
  // `launcherStem` is the bare filename (no extension) that the
  // generated script's own self-reference comments should use, e.g.
  // `ships-run-CustomerDNA`. Falls back to `ships-run` for callers
  // that don't supply one (older tests or programmatic invocations).
  if (!launcherStem) launcherStem = "ships-run";
  const out = [];
  // For cmd, rewrite $VAR_NAME → %VAR_NAME%. bash and PowerShell both use $VAR.
  const xform = s => shell === "cmd" ? s.replace(/\$([A-Z_][A-Z0-9_]*)/g, "%$1%") : s;
  const cont  = shell === "cmd" ? " ^" : shell === "powershell" ? " `" : " \\";
  const cmnt  = shell === "cmd" ? "::" : "#";

  // Bash on Windows needs POSIX-style paths in `cd`, `--source`, etc.
  // The script model is built once with the user's chosen OS separator,
  // so a Windows-OS pick bakes backslashes into SOURCE/OUTPUT_ROOT and
  // the constructed PROJECT/GRAPHS_DIR/ENV_CONFIG. Re-emit those as
  // forward slashes when rendering bash, and translate the leading
  // drive-letter form (`C:\`) into whatever the user's POSIX-on-Windows
  // shell expects — Git Bash, WSL, or Cygwin all spell the C: mount
  // differently. Heuristic: only transform strings that look like
  // file-system paths (contain `\`, `/`, or a drive letter), so we
  // don't mangle DESCRIPTION or DB_HOST etc.
  const flavour = bashFlavour || "gitbash";
  const drivePrefix = flavour === "wsl"    ? "/mnt"
                    : flavour === "cygwin" ? "/cygdrive"
                                           : "";  // gitbash → /c (no prefix)
  const looksLikePath = s =>
    /\\/.test(s) || /\//.test(s) || /^[A-Za-z]:/.test(s);
  const toBashPath = s => {
    if (!looksLikePath(s)) return s;
    let out = s.replace(
      /^([A-Za-z]):/,
      (_, d) => `${drivePrefix}/${d.toLowerCase()}`
    );
    out = out.replace(/\\/g, "/");
    return out;
  };
  const valueForShell = s => (shell === "bash" ? toBashPath(xform(s)) : xform(s));

  const setVar = (name, value, commented) => {
    const v = valueForShell(value);
    const pfx = commented ? (cmnt + " ") : "";
    if (shell === "bash")            out.push(`${pfx}${name}="${v}"`);
    else if (shell === "powershell") out.push(`${pfx}$${name} = "${v}"`);
    else                             out.push(`${pfx}set "${name}=${v}"`);
  };

  const emitCmd = (parts) => {
    if (parts.length === 1) { out.push(xform(parts[0])); return; }
    const indent = "  ";
    out.push(xform(parts[0]) + cont);
    for (let i = 1; i < parts.length; i++) {
      out.push(indent + xform(parts[i]) + (i < parts.length - 1 ? cont : ""));
    }
  };

  // Shebang / shell header. PS and cmd headers include a Mark-of-the-Web (MOTW)
  // unblock hint, because Windows SmartScreen blocks browser-downloaded .ps1
  // and .bat files with "These files can't be opened".
  if (shell === "bash") {
    out.push("#!/usr/bin/env bash");
    out.push("set -euo pipefail");
    out.push("");
    // Header lists the active form first, then the two alternatives,
    // so a user who picked the wrong flavour in the wizard knows what
    // to swap to without re-running the generator. Only SOURCE and
    // OUTPUT_ROOT carry the user-typed Windows paths — the derived
    // $PROJECT / $GRAPHS_DIR / $ENV_CONFIG compose from those.
    const flavourLabel = flavour === "wsl"    ? "WSL form (`/mnt/c/...`)"
                       : flavour === "cygwin" ? "Cygwin form (`/cygdrive/c/...`)"
                                              : "Git Bash / MSYS2 form (`/c/...`)";
    const alternativesByFlavour = {
      gitbash: ["#   WSL    — retarget SOURCE/OUTPUT_ROOT to `/mnt/c/...`",
                "#   Cygwin — retarget SOURCE/OUTPUT_ROOT to `/cygdrive/c/...`"],
      wsl:     ["#   Git Bash / MSYS2 — retarget SOURCE/OUTPUT_ROOT to `/c/...`",
                "#   Cygwin           — retarget SOURCE/OUTPUT_ROOT to `/cygdrive/c/...`"],
      cygwin:  ["#   Git Bash / MSYS2 — retarget SOURCE/OUTPUT_ROOT to `/c/...`",
                "#   WSL              — retarget SOURCE/OUTPUT_ROOT to `/mnt/c/...`"],
    };
    const alternatives = alternativesByFlavour[flavour] || alternativesByFlavour.gitbash;
    out.push(`# Paths below use ${flavourLabel}. For other POSIX-on-Windows shells:`);
    for (const line of alternatives) out.push(line);
    out.push("# Only SOURCE and OUTPUT_ROOT typically need editing — the");
    out.push("# derived $PROJECT / $GRAPHS_DIR / $ENV_CONFIG vars compose from them.");
  } else if (shell === "powershell") {
    out.push("# PowerShell — SHIPS Navigator generated script");
    out.push("# If Windows blocks this with 'These files can't be opened' (Mark-of-the-Web),");
    out.push("# either copy the commands below and paste into your shell, or run first:");
    out.push("#   Unblock-File -Path .\\" + launcherStem + ".ps1");
    out.push('$ErrorActionPreference = "Stop"');
  } else {
    out.push("@echo off");
    out.push(":: If Windows blocks this with 'These files can't be opened' (Mark-of-the-Web),");
    out.push(":: either copy the commands below and paste into your shell, or in PowerShell run:");
    out.push("::   Unblock-File -Path .\\" + launcherStem + ".bat");
    out.push("setlocal");
  }
  out.push("");

  // Preflight — the #1 support question is "the script runs nothing". The cause
  // is almost always that `ships` (a Python console script, not a standalone
  // binary) is not on PATH because the project venv isn't active. Fail loudly
  // with the remedy instead of letting the first real command die with a bare
  // "command not found". The FAQ tab explains where `ships` comes from.
  out.push(`${cmnt} Preflight: 'ships' is a Python console script, not a standalone download.`);
  out.push(`${cmnt} It is only on PATH once this repo is installed AND its venv is active.`);
  if (shell === "bash") {
    out.push("if ! command -v ships >/dev/null 2>&1; then");
    out.push('  echo "ERROR: \'ships\' is not on PATH. Activate your project venv (source .venv/bin/activate)" >&2');
    out.push('  echo "       or install it globally (uv tool install --editable <repo>), then re-run." >&2');
    out.push("  exit 1");
    out.push("fi");
  } else if (shell === "powershell") {
    out.push("if (-not (Get-Command ships -ErrorAction SilentlyContinue)) {");
    out.push('  Write-Error "\'ships\' is not on PATH. Activate your project venv (.\\.venv\\Scripts\\Activate.ps1) or install it globally (uv tool install --editable <repo>), then re-run. See the FAQ tab in the SHIPS Navigator."');
    out.push("  exit 1");
    out.push("}");
  } else {
    out.push("where ships >nul 2>nul || (echo ERROR: ships is not on PATH - activate your venv .venv\\Scripts\\activate.bat or install with: uv tool install --editable ^<repo^> ^& exit /b 1)");
  }
  out.push("");

  if (script.headNotes && script.headNotes.length) {
    for (const n of script.headNotes) out.push(`${cmnt} ${n}`);
    out.push("");
  }

  out.push(`${cmnt} === Shared variables — edit these to retarget the whole script ===`);
  for (const [n, v] of script.sharedVars) setVar(n, v, false);
  out.push("");
  out.push(`${cmnt} Deploy-time placeholders — uncomment + fill before running 'ships deploy'`);
  for (const [n, v] of script.deployVars) setVar(n, v, true);
  out.push("");

  if (script.prelude.length) {
    for (const parts of script.prelude) emitCmd(parts);
    out.push("");
  }

  for (let i = 0; i < script.perEnv.length; i++) {
    const b = script.perEnv[i];
    out.push(`${cmnt} --- Environment: ${b.env} ---`);
    for (const [n, v] of b.vars) setVar(n, v, false);
    out.push("");
    for (const parts of b.commands) emitCmd(parts);
    if (i < script.perEnv.length - 1) out.push("");
  }

  if (script.postlude && script.postlude.length) {
    out.push("");
    out.push(`${cmnt} Optional follow-ups — 'ships process' doesn't run these`);
    for (const parts of script.postlude) emitCmd(parts);
  }

  return out.join("\n");
}

function makeTokeniseConf(model, prefix) {
  const header = [
    "# config/tokenise.conf",
    "# Generated by SHIPS Navigator.",
    "# Each rule has the shape: <kind>::<pattern>:=<replacement>",
    "",
  ].join("\n");
  if (model === "prefix") {
    return header + [
      `# Prefix model: '${prefix}_' -> '{{DB_PREFIX}}_' anywhere it is not already`,
      `# inside an existing token (the (?<!\\{) guard avoids re-tokenising).`,
      `regex::(?<!\\{)\\b${prefix}_:={{DB_PREFIX}}_`,
      "",
    ].join("\n");
  }
  return header + [
    `# Per-database model: capture each database suffix after '${prefix}_' and`,
    `# turn it into its own token. e.g. '${prefix}_DOM_STD_T' -> '{{DOM_STD_T}}'.`,
    `regex::(?<!\\{)\\b${prefix}_([A-Za-z0-9]+(?:_[A-Za-z0-9]+)*):={{$1}}`,
    "",
  ].join("\n");
}

// ships.yaml packaging profile (#382). Persists the packaging decisions so
// `ships process --project .` is argless (consumed by the single front door,
// #384). source is only emitted for a filesystem source (a GitHub source is
// fetched per run via --source-github, not a stable local path).
function makeShipsYaml({ projName, envList, sourceType, sourceDir, pkgName }) {
  const envs = (envList && envList.length ? envList : ["DEV"]);
  const defaultEnv = envs[0];
  const lines = [
    "# ships.yaml — SHIPS project master config",
    "# Generated by SHIPS Navigator. The packaging: profile lets",
    "# `ships process --project .` run with no further flags (#382/#384).",
    `project: ${projName}`,
    `environments: [${envs.join(", ")}]`,
    "packaging:",
  ];
  if (sourceType === "filesystem" && sourceDir && sourceDir !== "<source-dir>") {
    lines.push(`  source: ${sourceDir}`);
  } else {
    lines.push("  # source: <raw-ddl-dir>   # omit to package the existing payload");
  }
  lines.push(`  name: ${pkgName}`);
  lines.push(`  default_env: ${defaultEnv}`);
  lines.push(`  env_config: config/env/${defaultEnv}.conf`);
  return lines.join("\n") + "\n";
}

function makeEnvConf(envName, tokenModel, prefix, externalParents) {
  const out = [
    `# config/env/${envName}.conf`,
    `# Token bindings for environment: ${envName}`,
    `# Generated by SHIPS Navigator. Replace <fill-me> values before running inspect.`,
    "",
  ];
  // External parent databases — platform-owned containers the package's
  // CREATE DATABASE ... FROM <parent> statements depend on but do NOT create.
  // Declaring them stops the build's environment-prereq trust gate flagging
  // them (signal environment_prereq_requires_dba_review). Metadata, not a
  // substituted token — exempt from coverage / orphan-scan checks.
  if (externalParents) {
    out.push("# Parent databases that already exist in the target and are NOT created");
    out.push("# by this package (the FROM parent in CREATE DATABASE Child FROM Parent).");
    out.push(`EXTERNAL_PARENTS=${externalParents}`);
    out.push("");
  } else {
    out.push("# EXTERNAL_PARENTS — list any parent databases that already exist in the");
    out.push("# target and are NOT created by this package (the FROM parent in");
    out.push("# CREATE DATABASE Child FROM Parent). Comma-separated. Uncomment to use:");
    out.push("# EXTERNAL_PARENTS=DATAPRODUCTS");
    out.push("");
  }
  if (!tokenModel) {
    out.push("# Source is already tokenised — use `ships bootstrap-env-config` to seed the");
    out.push("# real list from the payload's actual token usage. This skeleton is a fallback.");
    out.push("");
    return out.join("\n");
  }
  if (tokenModel === "prefix") {
    out.push(`DB_PREFIX=<fill-me>`);
    out.push("");
    return out.join("\n");
  }
  const sample = prefix && prefix !== "<PREFIX>" ? prefix : "Product";
  out.push("# One binding per database. Examples below — replace with your real list.");
  out.push("# Run `ships scan --project <PROJ> --all-envs --show-map` after harvest to see");
  out.push("# the exact token list the payload references.");
  out.push(`DOM_STD_T=<fill-me>          # was ${sample}_DOM_STD_T`);
  out.push(`DOM_STD_V=<fill-me>          # was ${sample}_DOM_STD_V`);
  out.push(`SEM_BUS_V=<fill-me>          # was ${sample}_SEM_BUS_V`);
  out.push("");
  return out.join("\n");
}

// ---------------------------------------------------------------------------
// Question rendering.
// ---------------------------------------------------------------------------
function renderQuestions() {
  const root = document.getElementById("questions");
  root.innerHTML = "";
  for (const qDef of QUESTIONS) {
    if (qDef.show && !qDef.show(answers)) {
      delete answers[qDef.id];
      continue;
    }
    const wrap = document.createElement("div");
    wrap.className = "question";

    const lbl = document.createElement("label");
    lbl.className = "qlabel";
    lbl.innerHTML = qDef.label;
    wrap.appendChild(lbl);

    if (qDef.hint) {
      const h = document.createElement("div");
      h.className = "qhint";
      h.innerHTML = qDef.hint;
      wrap.appendChild(h);
    }

    if (qDef.kind === "radio") {
      const grp = document.createElement("div");
      grp.className = "radios";
      for (const opt of qDef.options) {
        const id = `${qDef.id}__${opt.value}`;
        const oLbl = document.createElement("label");
        oLbl.setAttribute("for", id);
        if (answers[qDef.id] === opt.value) oLbl.classList.add("active");
        oLbl.textContent = opt.label;
        const inp = document.createElement("input");
        inp.type = "radio"; inp.name = qDef.id; inp.id = id; inp.value = opt.value;
        if (answers[qDef.id] === opt.value) inp.checked = true;
        inp.addEventListener("change", () => {
          answers[qDef.id] = opt.value;
          persist(); renderAll();
        });
        oLbl.prepend(inp);
        grp.appendChild(oLbl);
      }
      wrap.appendChild(grp);

      if (qDef.warnOn) {
        const w = qDef.warnOn(answers[qDef.id]);
        if (w) {
          const div = document.createElement("div");
          div.className = "warn";
          div.textContent = w;
          wrap.appendChild(div);
        }
      }
    } else if (qDef.kind === "text") {
      const inp = document.createElement("input");
      inp.type = "text";
      inp.value = answers[qDef.id] || "";
      inp.addEventListener("input", () => {
        answers[qDef.id] = inp.value;
        persist(); renderOutputs();
      });
      wrap.appendChild(inp);
    } else if (qDef.kind === "checkbox") {
      const lbl2 = document.createElement("label");
      lbl2.className = "check";
      const inp = document.createElement("input");
      inp.type = "checkbox";
      inp.checked = !!answers[qDef.id];
      inp.addEventListener("change", () => {
        answers[qDef.id] = inp.checked;
        persist(); renderOutputs();
      });
      lbl2.appendChild(inp);
      lbl2.appendChild(document.createTextNode(" yes"));
      wrap.appendChild(lbl2);
    }
    root.appendChild(wrap);
  }
}

function renderCommandsPanel(plan) {
  const panel = document.getElementById("panel-commands");
  panel.innerHTML = "";

  const modeBanner = document.createElement("div");
  modeBanner.className = "info";
  modeBanner.style.marginBottom = "12px";
  modeBanner.innerHTML = (plan.mode === "quick"
    ? "<b>Quick mode</b> — one <code>ships process</code> call per environment, runs harvest → generate → inspect → analyse → package end-to-end."
    : "<b>Detailed mode</b> — each pipeline step shown separately for transparency, CI scripting, or selective re-runs.")
    + " Long paths bind to shell variables (<code>$PROJECT</code>, <code>$SOURCE</code>, <code>$ENV_CONFIG</code> …) so retargeting is a one-line edit at the top.";
  panel.appendChild(modeBanner);

  // Issue #485 — bundle the package name into the launcher filename so
  // multiple SHIPS projects in the same directory don't overwrite each
  // other's `ships-run.*` files. Derive once and reuse below.
  const pkgName = (plan.package && plan.package.name) || "package";
  const launcherStem = safeLauncherStem(pkgName);

  // Windows MOTW warning — SmartScreen blocks downloaded .ps1 / .bat files.
  const motwBanner = document.createElement("div");
  motwBanner.className = "warn";
  motwBanner.style.marginBottom = "12px";
  motwBanner.innerHTML =
    "<b>Windows note:</b> If you download the <code>.ps1</code> or <code>.bat</code>, Windows may block it " +
    "(\"These files can't be opened\" — Mark-of-the-Web). Two ways round it: " +
    "<b>(a)</b> use the <b>Copy</b> button and paste the commands into your terminal — no file, no block; or " +
    "<b>(b)</b> in PowerShell run <code>Unblock-File -Path .\\" + escapeHtml(launcherStem) + ".ps1</code> after download.";
  panel.appendChild(motwBanner);

  // Tokenise.conf reminder — only on the "wizard configures tokenisation"
  // path (source not already tokenised). Harvest auto-applies
  // config/tokenise.conf, but ONLY if the file is actually in the project.
  // Copy-pasting just the commands (skipping the tokenise.conf tab) leaves
  // names hardcoded and they resurface as inspect 'hardcoded_name' warnings.
  if (plan.tokeniseConf) {
    const projDir = plan.projDir || "<project>";
    const tokBanner = document.createElement("div");
    tokBanner.className = "warn";
    tokBanner.style.marginBottom = "12px";
    tokBanner.innerHTML =
      "<b>Before you run harvest:</b> save the <b>tokenise.conf</b> tab to " +
      "<code>" + escapeHtml(projDir) + "/config/tokenise.conf</code> first. " +
      "Harvest applies it automatically — but only if the file is in the project. " +
      "If you copy just the commands and skip it, the database names stay " +
      "hardcoded and reappear as <code>hardcoded_name</code> warnings in inspect. " +
      "(The <b>Download all</b> button bundles it in the right place for you.)";
    panel.appendChild(tokBanner);
  }

  const psText  = renderScript(plan.script, "powershell", plan.bashFlavour, launcherStem);
  const shText  = renderScript(plan.script, "bash",       plan.bashFlavour, launcherStem);
  const batText = renderScript(plan.script, "cmd",        plan.bashFlavour, launcherStem);

  // The default shell (first in the OS-based order) renders expanded; the other
  // two collapse into <details> so users don't scroll past them but still see
  // they exist and can compare on demand.
  function block(title, fname, body, expanded) {
    const wrap = expanded ? document.createElement("div") : document.createElement("details");
    if (!expanded) wrap.style.marginBottom = "14px";
    wrap.className = "file-block";

    if (expanded) {
      const h = document.createElement("h3");
      h.textContent = title;
      wrap.appendChild(h);
    } else {
      const sum = document.createElement("summary");
      sum.style.cursor = "pointer";
      sum.style.fontWeight = "600";
      sum.style.color = "var(--td-navy)";
      sum.style.fontFamily = "var(--td-mono)";
      sum.style.fontSize = "13px";
      sum.style.padding = "8px 10px";
      sum.style.background = "var(--td-grey-1)";
      sum.style.border = "1px solid var(--td-grey-2)";
      sum.style.borderRadius = "3px";
      sum.textContent = "▸ " + title + " — click to expand";
      wrap.appendChild(sum);
    }

    const pre = document.createElement("pre");
    pre.textContent = body;
    wrap.appendChild(pre);

    const actions = document.createElement("div");
    actions.className = "actions";
    actions.appendChild(makeCopyBtn(body));
    actions.appendChild(makeDownloadBtn(fname, body));
    wrap.appendChild(actions);

    panel.appendChild(wrap);
  }

  if (plan.os === "windows") {
    block("PowerShell (.ps1) — default for Windows paths", launcherStem + ".ps1", psText,  true);
    block("Windows cmd (.bat)",                            launcherStem + ".bat", batText, false);
    block("POSIX bash (.sh)",                              launcherStem + ".sh",  shText,  false);
  } else {
    block("POSIX bash (.sh) — default for POSIX paths",    launcherStem + ".sh",  shText,  true);
    block("PowerShell (.ps1)",                             launcherStem + ".ps1", psText,  false);
    block("Windows cmd (.bat)",                            launcherStem + ".bat", batText, false);
  }
}

const ANATOMY = {
  name: "<project>/",
  desc: "Created by <code>ships scaffold --name &lt;NAME&gt; --output &lt;PARENT&gt;</code>. Everything below is relative to this root.",
  children: [
    { name: ".gitignore",      desc: "Standard ignores — excludes <code>releases/</code>, work directories, and IDE noise so the repo stays clean." },
    { name: "README.md",       desc: "Placeholder written by scaffold. Describe your project here for the next human." },

function renderAnatomyNode(node, expanded) {
  const hasChildren = !!(node.children && node.children.length);
  if (!hasChildren) {
    const wrap = document.createElement("div");
    const row = document.createElement("div");
    row.className = "leaf";
    row.innerHTML = node.name;
    wrap.appendChild(row);
    if (node.desc) {
      const d = document.createElement("div");
      d.className = "desc";
      d.innerHTML = node.desc;
      wrap.appendChild(d);
    }
    return wrap;
  }

  const det = document.createElement("details");
  if (expanded) det.open = true;
  const sum = document.createElement("summary");
  sum.innerHTML = "<b>" + node.name + "</b>";
  det.appendChild(sum);
  if (node.desc) {
    const d = document.createElement("div");
    d.className = "desc";
    d.innerHTML = node.desc;
    det.appendChild(d);
  }
  for (const child of node.children) det.appendChild(renderAnatomyNode(child, false));
  return det;
}

    ["wave", "An ordered batch of objects with no intra-batch dependencies. <code>ships analyse</code> emits <code>_waves.txt</code> so deploy proceeds wave-by-wave."],

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function makeCopyBtn(text, label) {
  const b = document.createElement("button");
  b.className = "btn";
  b.textContent = label || "Copy";
  b.addEventListener("click", () => {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0";

function makeDownloadBtn(filename, text) {

}
function downloadBlob(filename, blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---------------------------------------------------------------------------
// Vanilla-JS ZIP encoder (STORE only, no deflate). ~80 lines.
// Lets the wizard ship a single .zip of every generated file without a CDN.
// ---------------------------------------------------------------------------
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = (c >>> 8) ^ CRC_TABLE[(c ^ bytes[i]) & 0xFF];
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function encUtf8(s) { return new TextEncoder().encode(s); }

function buildZip(files /* [{name, body}] */) {
  const dosTime = 0;
  const dosDate = ((2026 - 1980) << 9) | (1 << 5) | 1; // 2026-01-01 — fixed for determinism
  const local = [];
  const central = [];
  let offset = 0;
  for (const f of files) {
    const name = encUtf8(f.name);
    const data = encUtf8(f.body);
    const crc = crc32(data);
    const size = data.length;

    const lh = new Uint8Array(30 + name.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0x0800, true); // UTF-8 flag
    lv.setUint16(8, 0, true);      // store
    lv.setUint16(10, dosTime, true);
    lv.setUint16(12, dosDate, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, name.length, true);
    lv.setUint16(28, 0, true);
    lh.set(name, 30);
    const blk = new Uint8Array(lh.length + data.length);
    blk.set(lh, 0); blk.set(data, lh.length);
    local.push(blk);

    const cd = new Uint8Array(46 + name.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0x0800, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, dosTime, true);
    cv.setUint16(14, dosDate, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, name.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    cd.set(name, 46);
    central.push(cd);

    offset += blk.length;
  }
  const cdSize = central.reduce((a, b) => a + b.length, 0);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true);
  ev.setUint32(16, offset, true);
  ev.setUint16(20, 0, true);

  const total = offset + cdSize + 22;
  const out = new Uint8Array(total);
  let p = 0;
  for (const c of local)   { out.set(c, p); p += c.length; }
  for (const c of central) { out.set(c, p); p += c.length; }
  out.set(eocd, p);
  return out;
}

function downloadAllBundle() {
  const plan = window.__lastPlan;
  if (!plan) return;
  const files = [];

  // Issue #485 — per-package launcher stem so multiple SHIPS projects
  // can live side by side without overwriting each other's launchers.
  const pkgName = (plan.package && plan.package.name) || "package";
  const launcherStem = safeLauncherStem(pkgName);

  // Commands in all three shells. bashFlavour is consulted only by the
  // bash renderer (PS / cmd ignore it) — see renderScript().
  files.push({ name: launcherStem + ".ps1", body: renderScript(plan.script, "powershell", plan.bashFlavour, launcherStem) });
  files.push({ name: launcherStem + ".sh",  body: renderScript(plan.script, "bash",       plan.bashFlavour, launcherStem) });
  files.push({ name: launcherStem + ".bat", body: renderScript(plan.script, "cmd",        plan.bashFlavour, launcherStem) });

  if (plan.tokeniseConf) files.push({ name: "config/tokenise.conf", body: plan.tokeniseConf });

  for (const f of plan.envFiles) files.push({ name: f.name, body: f.body });

  if (plan.shipsYaml) files.push({ name: "ships.yaml", body: plan.shipsYaml });

  files.push({ name: "plan.json", body: JSON.stringify(buildPlanJson(), null, 2) });

  const readme = [
    "# SHIPS Navigator bundle",
    "",
    "Generated by the offline SHIPS Navigator wizard.",
    "",
    "## Files",
    "",
    "- `" + launcherStem + ".ps1` / `" + launcherStem + ".sh` / `" + launcherStem + ".bat` — the command sequence in PowerShell, bash, and cmd. Pick the one for your shell.",
    plan.tokeniseConf ? "- `config/tokenise.conf` — token rewrite rules." : null,
    plan.envFiles.length ? "- `config/env/*.conf` — env file skeletons (replace `<fill-me>` before running)." : null,
    plan.tokensAlready ? "- (No env skeletons — source is already tokenised; the script runs `ships bootstrap-env-config` to seed real ones.)" : null,
    plan.shipsYaml ? "- `ships.yaml` — project master config with a `packaging:` profile so `ships process --project .` runs argless." : null,
    "- `plan.json` — the answers you gave. Paste into the wizard to re-hydrate.",
    "",
    "## Running",
    "",
    "Drop these files into your SHIPS project root (or run from the parent directory).",
    "Long paths bind to shell variables at the top of each script — retargeting is a one-line edit to `$OUTPUT_ROOT`, `$NAME`, or `$SOURCE`.",
    "",
    plan.tokeniseConf ? "### Tokenisation" : null,
    plan.tokeniseConf ? "" : null,
    plan.tokeniseConf ? "`config/tokenise.conf` must be in the project **before** you run harvest — harvest applies it automatically, but only if the file is present. If it's missing, the database names stay hardcoded and reappear as `hardcoded_name` warnings in inspect. Extracting this whole bundle at the project root puts it in the right place; if you copy commands by hand, save the tokenise.conf tab to `config/tokenise.conf` yourself first." : null,
    plan.tokeniseConf ? "" : null,
    "### `ships: command not found`?",
    "",
    "`ships` is a Python console script (defined in `pyproject.toml`), not a standalone download. It only appears on your PATH once this repo is installed AND its venv is active. The scripts now preflight-check for it. To fix:",
    "",
    "- **Activate the venv:** `\\.venv\\Scripts\\Activate.ps1` (PowerShell) or `source .venv/bin/activate` (bash), then re-run; or",
    "- **Install it globally:** `uv tool install --editable <repo>` (or `pipx install -e <repo>`) so `ships` is on PATH in every terminal.",
    "",
    "Verify with `ships --help` before running the script. See the **FAQ** tab in the SHIPS Navigator for more.",
    "",
    "## Guardrails",
    "",
    ...plan.guardrails.map(g => "- " + g),
    "",
  ].filter(Boolean).join("\n");
  files.push({ name: "README.md", body: readme });

  const bytes = buildZip(files);
  downloadBlob("ships-navigator-bundle.zip", new Blob([bytes], { type: "application/zip" }));
}

// ---------------------------------------------------------------------------
// Tab switching + global wiring.
// ---------------------------------------------------------------------------
function setTab(id) {
  activeTab = id;
  for (const b of document.querySelectorAll("#tabs button")) b.classList.toggle("active", b.dataset.tab === id);
  for (const p of document.querySelectorAll(".panel")) p.classList.toggle("active", p.id === "panel-" + id);
  persist();
}
document.getElementById("tabs").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-tab]");
  if (btn) setTab(btn.dataset.tab);
});

document.getElementById("plan-apply").addEventListener("click", () => {
  const raw = document.getElementById("plan-import").value.trim();
  if (!raw) return;
  try {
    applyPlan(JSON.parse(raw));
    persist(); renderAll();
  } catch (err) {
    alert("Could not parse plan.json: " + err.message);
  }
});
document.getElementById("plan-clear").addEventListener("click", () => {
  document.getElementById("plan-import").value = "";
});
document.getElementById("reset-all").addEventListener("click", () => {
  if (!confirm("Clear all answers? This cannot be undone.")) return;
  for (const k of Object.keys(answers)) delete answers[k];
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
  renderAll();
});
document.getElementById("download-all").addEventListener("click", downloadAllBundle);

// Persistent plan.json affordances in the output header. The previous
// home — buried under the "Why each step" tab — was hard to find when
// users wanted to save their answers. Both handlers rebuild the plan
// fresh on click so they always reflect the current form state, not a
// snapshot from when the panel last rendered.
document.getElementById("save-plan").addEventListener("click", () => {
  const text = JSON.stringify(buildPlanJson(), null, 2);
  downloadBlob("plan.json", new Blob([text], { type: "application/json" }));
});
document.getElementById("copy-plan").addEventListener("click", (e) => {
  const text = JSON.stringify(buildPlanJson(), null, 2);
  const btn = e.currentTarget;
  const original = btn.textContent;
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = original; }, 1200);
  } catch (err) {
    btn.textContent = "Copy failed";
    setTimeout(() => { btn.textContent = original; }, 1500);
  }
});

function renderAll() {
  renderQuestions();
  renderOutputs();
  // Restore tab after re-render
  setTab(activeTab);
}

hydrate();
renderAll();
</script>
</body>
</html>
